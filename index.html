<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF5EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cata">
  <link rel="manifest" href="manifest.json">
  <title>Cata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#FAF5EE;--bg2:#F2ECE2;--card:#fff;--cb:rgba(92,26,42,.08);
      --shadow:0 2px 16px rgba(44,24,16,.06);
      --wine:#722F37;--wine-lt:#9B4A54;--wine-dk:#4A1520;
      --gold:#C4942A;--gold-lt:#D4A84B;
      --text:#2C1810;--dim:#8B7355;--dim2:#C4B49A;
      --cream:#FAF5EE;
      --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px}

    #wrap{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
    header{flex-shrink:0;padding:14px 20px 10px;padding-top:calc(14px + var(--st));background:var(--bg)}
    main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}
    nav.bnav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid rgba(92,26,42,.08);padding-bottom:var(--sb)}

    /* AUTH */
    #auth{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;background:linear-gradient(180deg,#FAF5EE 0%,#F0E8DC 100%)}
    .auth-logo{font-family:'Fraunces',serif;font-style:italic;font-size:80px;font-weight:300;line-height:1;margin-bottom:6px;color:var(--wine)}
    .auth-tag{font-size:14px;color:var(--dim);letter-spacing:.06em;margin-bottom:44px}
    .auth-card{width:100%;max-width:380px;background:#fff;border:1px solid var(--cb);border-radius:24px;padding:28px 22px;box-shadow:var(--shadow)}
    .atabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:22px}
    .atab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:14px;font-weight:500;color:var(--dim);cursor:pointer;transition:.2s;user-select:none}
    .atab.active{background:#fff;color:var(--wine);box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .auth-err{background:rgba(196,60,60,.08);border:1px solid rgba(196,60,60,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#A04040;text-align:left;margin-bottom:12px}
    .auth-ok{background:rgba(60,140,80,.08);border:1px solid rgba(60,140,80,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#2A7A3A;text-align:left;margin-bottom:12px}

    .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:6px;display:block;font-weight:500}
    .inp{width:100%;background:var(--bg);border:1px solid rgba(92,26,42,.12);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:.2s;margin-bottom:12px}
    .inp:focus{border-color:var(--wine);background:#fff}
    .inp::placeholder{color:var(--dim2)}
    textarea.inp{resize:vertical;min-height:110px;margin-bottom:0}
    .btn-grad{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--wine),var(--wine-dk));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:.15s;margin-top:4px}
    .btn-grad:active{transform:scale(.97);opacity:.9}
    .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    .view{display:none}.view.active{display:block;animation:vup .25s ease}
    @keyframes vup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .hrow{display:flex;align-items:center;gap:12px}
    .back{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cb);border-radius:50%;cursor:pointer;color:var(--wine);font-size:20px;flex-shrink:0;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .back:active{transform:scale(.88)}
    .htitle{font-family:'Fraunces',serif;font-style:italic;font-size:22px;font-weight:400;color:var(--wine-dk)}
    .hsub{font-size:12px;color:var(--dim);margin-top:1px}
    .hacts{margin-left:auto;display:flex;gap:8px}
    .ibtn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cb);border-radius:50%;cursor:pointer;font-size:15px;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .ibtn:active{transform:scale(.88)}

    .prog{display:flex;gap:5px;margin-top:12px}.ps{height:3px;flex:1;border-radius:2px;background:var(--bg2);transition:background .3s}
    .ps.done{background:var(--gold)}.ps.cur{background:var(--wine)}

    .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;cursor:pointer;color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;gap:4px;font-weight:500;transition:.15s;user-select:none}
    .ni-ic{font-size:20px}.ni.active{color:var(--wine)}.ni:active{transform:scale(.88)}

    /* HOME */
    .home-hi{padding:20px 20px 12px}
    .home-g{font-family:'Fraunces',serif;font-style:italic;font-size:36px;font-weight:300;line-height:1.1;color:var(--text)}
    .home-g strong{font-weight:500;color:var(--wine)}
    .home-s{font-size:13px;color:var(--dim);margin-top:5px}
    .stats{display:flex;gap:10px;padding:0 20px 14px}
    .stat{flex:1;background:#fff;border:1px solid var(--cb);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow)}
    .stat-n{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--wine)}
    .stat-l{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .swi{position:relative;padding:0 20px 14px}.swi::before{content:'🔍';position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    .search{width:100%;background:#fff;border:1px solid var(--cb);border-radius:12px;padding:11px 16px 11px 42px;color:var(--text);font-size:14px;outline:none;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.03)}
    .search:focus{border-color:var(--wine)}.search::placeholder{color:var(--dim2)}
    .clist{padding:0 16px 120px;display:flex;flex-direction:column;gap:10px}
    .cc{background:#fff;border:1px solid var(--cb);border-radius:18px;padding:15px 16px;cursor:pointer;transition:.15s;display:flex;gap:14px;align-items:center;box-shadow:var(--shadow)}
    .cc:active{transform:scale(.98);border-color:var(--wine-lt)}
    .cc-dot{width:48px;height:48px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.06)}
    .cc-info{flex:1;min-width:0}.cc-name{font-family:'Fraunces',serif;font-size:17px;font-weight:400;font-style:italic;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cc-meta{font-size:12px;color:var(--dim);margin-top:2px}
    .cc-score{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--wine);flex-shrink:0}
    .fab{position:fixed;bottom:calc(76px + var(--sb));right:20px;width:56px;height:56px;background:linear-gradient(135deg,var(--wine),var(--wine-dk));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 6px 24px rgba(114,47,55,.35);transition:.15s;z-index:50}
    .fab:active{transform:scale(.9)}
    .empty{text-align:center;padding:60px 40px}.empty-ic{font-size:56px;opacity:.3;margin-bottom:16px}
    .empty-t{font-family:'Fraunces',serif;font-style:italic;font-size:22px;color:var(--dim);margin-bottom:8px}
    .empty-s{font-size:13px;color:var(--dim2);line-height:1.6}

    /* FORM */
    .fbody{padding:8px 20px 145px}
    .step-t{font-family:'Fraunces',serif;font-style:italic;font-size:32px;font-weight:300;line-height:1.05;margin-bottom:3px;color:var(--wine)}
    .step-s{font-size:13px;color:var(--dim);margin-bottom:24px}
    .field{margin-bottom:20px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{padding:8px 15px;border-radius:100px;border:1px solid rgba(92,26,42,.15);background:#fff;color:var(--dim);font-size:14px;cursor:pointer;transition:.12s;user-select:none}
    .chip:active{transform:scale(.93)}.chip.sel{background:var(--wine);border-color:var(--wine);color:#fff}

    .color-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .color-opt{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
    .color-circle{width:50px;height:50px;border-radius:50%;border:3px solid transparent;transition:.15s}
    .color-circle:active{transform:scale(.88)}.color-circle.sel{border-color:var(--wine);transform:scale(1.08);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--wine)}
    .color-lbl{font-size:10px;color:var(--dim);text-align:center;line-height:1.2;max-width:65px}
    .color-hint{margin-top:10px;padding:10px 14px;background:rgba(114,47,55,.06);border:1px solid rgba(114,47,55,.15);border-radius:10px;font-size:13px;color:var(--wine)}

    .expand-block{margin-top:12px;padding:10px 0 4px 14px;border-left:3px solid rgba(114,47,55,.2);animation:vup .2s ease}
    .expand-header{font-size:11px;color:var(--wine);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .expand-cat{margin-bottom:12px}
    .expand-cat-t{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px}

    .score-wrap{text-align:center;padding:10px 0}
    .score-n{font-family:'Fraunces',serif;font-size:96px;font-weight:300;line-height:1;color:var(--wine)}
    .score-l{font-size:14px;color:var(--dim);margin-top:4px;font-style:italic}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bg2);outline:none;margin:16px 0;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--wine);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(114,47,55,.3)}

    .fnav{position:fixed;bottom:calc(58px + var(--sb));left:0;right:0;max-width:480px;margin:0 auto;padding:10px 20px 14px;background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;gap:10px;z-index:40}
    .btn{flex:1;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;transition:.15s}
    .btn:active{transform:scale(.97)}
    .btn-p{background:linear-gradient(135deg,var(--wine),var(--wine-dk));color:#fff;box-shadow:0 4px 16px rgba(114,47,55,.25)}
    .btn-g{background:#fff;border:1px solid var(--cb);color:var(--dim);flex:0 0 auto;padding:15px 18px}
    .btn-s{background:linear-gradient(135deg,var(--gold),#A07A18);color:#fff}

    /* DETAIL */
    .dwrap{padding:0 20px 120px}
    .dhero{display:flex;align-items:center;gap:16px;padding:16px 0 20px;border-bottom:1px solid var(--cb);margin-bottom:20px}
    .hdot{width:68px;height:68px;border-radius:50%;border:3px solid rgba(0,0,0,.06);flex-shrink:0}
    .hname{font-family:'Fraunces',serif;font-style:italic;font-size:26px;font-weight:400;color:var(--text)}
    .hmeta{font-size:13px;color:var(--dim);margin-top:3px}
    .hscore-big{font-family:'Fraunces',serif;font-size:36px;font-weight:400;color:var(--wine);margin-top:4px}
    .hscore-big small{font-size:13px;color:var(--dim);font-weight:400}
    .dsec{margin-bottom:22px}
    .dsec-t{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--wine);padding-bottom:8px;border-bottom:1px solid var(--cb);margin-bottom:12px;font-weight:600}
    .drow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:14px;gap:12px}
    .dl{color:var(--dim);flex-shrink:0}.dv{color:var(--text);text-align:right;font-weight:400}
    .atags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
    .atag{padding:5px 12px;background:rgba(114,47,55,.06);border:1px solid rgba(114,47,55,.12);border-radius:100px;font-size:12px;color:var(--wine)}
    .ccom{font-size:14px;line-height:1.75;color:var(--text);font-style:italic;background:rgba(114,47,55,.04);padding:16px;border-radius:12px;border-left:3px solid var(--wine)}
    .dacts{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    .btn-del{background:#fff;border:1px solid rgba(196,60,60,.25);color:#A04040;padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer;transition:.15s}
    .btn-del:active{background:rgba(196,60,60,.05)}
    .btn-share{background:rgba(114,47,55,.06);border:1px solid rgba(114,47,55,.15);color:var(--wine);padding:12px 16px;border-radius:10px;font-size:14px;cursor:pointer;transition:.15s;font-weight:500}
    .btn-share:active{background:rgba(114,47,55,.12)}

    .radar-wrap{display:flex;justify-content:center;padding:12px 0 4px}
    .radar-wrap svg text{font-family:'DM Sans',sans-serif;fill:var(--dim);font-size:10px}

    /* BIBLIOTECA */
    .rwrap{padding:8px 20px 110px}
    .rsec{margin-bottom:28px}
    .rtitle{font-family:'Fraunces',serif;font-style:italic;font-size:22px;font-weight:300;color:var(--wine);margin-bottom:3px}
    .rrule{height:2px;background:linear-gradient(to right,var(--wine),transparent);margin:8px 0 14px;border-radius:1px}

    /* Aroma cards */
    .aroma-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .aroma-card{background:#fff;border:1px solid var(--cb);border-radius:14px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .aroma-card:active{transform:scale(.97)}
    .aroma-card-bar{height:4px;border-radius:2px;margin-bottom:10px}
    .aroma-card-name{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
    .aroma-card-count{font-size:11px;color:var(--dim)}
    .aroma-detail{background:#fff;border:1px solid var(--cb);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
    .aroma-detail-title{font-family:'Fraunces',serif;font-size:18px;color:var(--wine);margin-bottom:12px;font-style:italic}

    /* Flashcards */
    .fc-container{display:flex;flex-direction:column;align-items:center;padding:20px 0}
    .fc-card{width:100%;max-width:320px;min-height:200px;border-radius:20px;position:relative;perspective:1000px;cursor:pointer;margin-bottom:20px}
    .fc-inner{width:100%;min-height:200px;transition:transform .5s;transform-style:preserve-3d;position:relative}
    .fc-card.flipped .fc-inner{transform:rotateY(180deg)}
    .fc-front,.fc-back{width:100%;min-height:200px;border-radius:20px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;backface-visibility:hidden;position:absolute;top:0;left:0}
    .fc-front{background:linear-gradient(135deg,var(--wine),var(--wine-dk));color:#fff;box-shadow:0 8px 30px rgba(114,47,55,.25)}
    .fc-back{background:#fff;border:2px solid var(--wine);color:var(--text);transform:rotateY(180deg);box-shadow:var(--shadow)}
    .fc-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.6;margin-bottom:12px}
    .fc-question{font-family:'Fraunces',serif;font-size:24px;font-style:italic;font-weight:400;line-height:1.3}
    .fc-answer{font-family:'Fraunces',serif;font-size:20px;font-weight:500;color:var(--wine);margin-bottom:8px}
    .fc-hint{font-size:13px;color:var(--dim);line-height:1.5}
    .fc-nav{display:flex;gap:12px;width:100%;max-width:320px}
    .fc-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;text-align:center;border:none}
    .fc-btn:active{transform:scale(.95)}
    .fc-btn-prev{background:var(--bg2);color:var(--dim)}
    .fc-btn-next{background:var(--wine);color:#fff}
    .fc-counter{font-size:12px;color:var(--dim);margin-bottom:12px}
    .fc-tap{font-size:12px;color:var(--dim2);margin-top:8px}
    .fc-mode{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}
    .fc-mode-btn{padding:8px 14px;border-radius:100px;border:1px solid var(--cb);background:#fff;color:var(--dim);font-size:13px;cursor:pointer;transition:.12s}
    .fc-mode-btn.active{background:var(--wine);border-color:var(--wine);color:#fff}

    /* PROFILE */
    .pwrap{padding:32px 20px 110px}
    .pavatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--wine),var(--wine-dk));display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;box-shadow:0 6px 20px rgba(114,47,55,.2)}
    .pname{font-family:'Fraunces',serif;font-size:22px;font-style:italic;color:var(--text);text-align:center;margin-bottom:4px}
    .pemail{font-size:13px;color:var(--dim);text-align:center;margin-bottom:28px}
    .pcard{background:#fff;border:1px solid var(--cb);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
    .btn-out{width:100%;padding:14px;border-radius:12px;border:1px solid var(--cb);background:#fff;color:var(--dim);font-size:15px;cursor:pointer;font-weight:500}
    .btn-out:active{background:var(--bg2)}

    #toast{position:fixed;bottom:calc(80px + var(--sb));left:50%;transform:translateX(-50%) translateY(16px);background:var(--wine-dk);border-radius:12px;padding:12px 20px;font-size:13px;color:#fff;white-space:nowrap;opacity:0;transition:.25s;z-index:999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    ::-webkit-scrollbar{width:0}
  </style>
</head>
<body>
<div id="toast"></div>

<div id="auth">
  <div class="auth-logo">Cata</div><div class="auth-tag">tu diario de vinos</div>
  <div class="auth-card">
    <div class="atabs" id="auth-tabs"><div class="atab active" id="tab-in" onclick="setMode('login')">Ingresar</div><div class="atab" id="tab-up" onclick="setMode('register')">Registrarse</div></div>
    <div id="amsg"></div>
    <label class="lbl">Email</label><input class="inp" id="a-em" type="email" placeholder="tu@email.com">
    <div id="nw" style="display:none"><label class="lbl">Tu nombre</label><input class="inp" id="a-nm" type="text" placeholder="Ej: María"></div>
    <div id="pw-wrap"><label class="lbl">Contraseña</label><input class="inp" id="a-pw" type="password" placeholder="••••••••"></div>
    <button class="btn-grad" id="abtn" onclick="handleAuth()">Ingresar</button>
    <div id="auth-links" style="margin-top:14px;display:flex;flex-direction:column;gap:10px;text-align:center">
      <span style="font-size:13px;color:var(--wine);cursor:pointer;font-weight:500" onclick="setMode('magic')">✉️ Entrar sin contraseña</span>
      <span style="font-size:13px;color:var(--dim);cursor:pointer" onclick="setMode('reset')">Olvidé mi contraseña</span>
    </div>
    <div id="back-link" style="display:none;margin-top:14px;text-align:center">
      <span style="font-size:13px;color:var(--dim);cursor:pointer" onclick="setMode('login')">← Volver</span>
    </div>
  </div>
</div>

<div id="wrap" style="display:none">
  <header id="hdr"></header>
  <main id="main"><div class="view" id="v-home"></div><div class="view" id="v-nueva"></div><div class="view" id="v-ver"></div><div class="view" id="v-ref"></div><div class="view" id="v-profile"></div></main>
  <nav class="bnav">
    <div class="ni" id="ni-home" onclick="go('home')"><span class="ni-ic">🍷</span><span>Catas</span></div>
    <div class="ni" id="ni-nueva" onclick="go('nueva')"><span class="ni-ic">✦</span><span>Nueva</span></div>
    <div class="ni" id="ni-ref" onclick="go('ref')"><span class="ni-ic">📖</span><span>Aprender</span></div>
    <div class="ni" id="ni-profile" onclick="go('profile')"><span class="ni-ic">◎</span><span>Perfil</span></div>
  </nav>
</div>

function buildStep(s){const f=S.f;if(s===0)return`<div class="step-t">¿Qué catamos?</div><div class="step-s">Datos del vino</div><div class="row2"><div class="field"><label class="lbl">Bodega</label><input class="inp" placeholder="Catena Zapata" value="${f.bodega||''}" oninput="S.f.bodega=this.value"></div><div class="field"><label class="lbl">Etiqueta</label><input class="inp" placeholder="Adrianna" value="${f.etiqueta||''}" oninput="S.f.etiqueta=this.value"></div></div><div class="row2"><div class="field"><label class="lbl">Varietal</label><input class="inp" placeholder="Malbec" value="${f.varietal||''}" oninput="S.f.varietal=this.value"></div><div class="field"><label class="lbl">Añada</label><input class="inp" placeholder="2022" value="${f.añada||''}" oninput="S.f.añada=this.value" inputmode="numeric"></div></div><div class="row2"><div class="field"><label class="lbl">Origen</label><input class="inp" placeholder="Mendoza" value="${f.origen||''}" oninput="S.f.origen=this.value"></div><div class="field"><label class="lbl">Precio ($)</label><input class="inp" placeholder="5000" value="${f.precio||''}" oninput="S.f.precio=this.value" inputmode="decimal"></div></div>`;if(s===1){const sb=f.cBase;return`<div class="step-t">Vista</div><div class="step-s">Examen visual</div><div class="field"><label class="lbl">Apariencia</label><div class="chips">${c1('apariencia',['Brillante','Opaco','Turbio'])}</div></div><div class="field"><label class="lbl">Intensidad</label><div class="chips">${c1('intV',['Leve','Media','Alta'])}</div></div><div class="field"><label class="lbl">Color</label><div class="chips">${Object.keys(COLORES).map(b=>`<div class="chip${f.cBase===b?' sel':''}" data-g="cBase" data-v="${b}">${b}</div>`).join('')}</div>${sb?`<div class="color-row">${COLORES[sb].map(sh=>`<div class="color-opt" onclick="pickSh('${sh.n.replace(/'/g,"\\'")}','${sh.h}')"><div class="color-circle${f.cShade===sh.n?' sel':''}" style="background:${sh.h}"></div><div class="color-lbl">${sh.n}</div></div>`).join('')}</div>${f.cShade?`<div class="color-hint">✓ ${sb} ${f.cShade}</div>`:''}`:''}  </div><div class="field"><label class="lbl">Reflejo</label><div class="chips"><div class="chip${f.reflejo?' sel':''}" onclick="S.f.reflejo=!S.f.reflejo;renderNueva()">Presenta reflejo</div></div></div>`}if(s===2)return`<div class="step-t">Nariz</div><div class="step-s">Perfil olfativo</div><div class="field"><label class="lbl">Limpidez</label><div class="chips">${c1('limpidez',['Limpio','Defectuoso'])}</div></div><div class="field"><label class="lbl">Intensidad</label><div class="chips">${c1('intN',['Neutra','Baja','Media','Alta'])}</div></div><div class="field"><label class="lbl">Desarrollo</label><div class="chips">${c1('desarrollo',['Joven','En desarrollo','Evolucionado'])}</div></div><div class="field"><label class="lbl">Perfil</label><div class="chips">${cM('pN',['Frutado','Herbáceo','Floral','Especiado','Madera','Herbal','Otros'])}</div>${expander('pN','aN')}</div><div class="field"><label class="lbl">Complejidad</label><div class="chips">${c1('compN',['Simple','Media','Alta'])}</div></div>`;if(s===3)return`<div class="step-t">Boca</div><div class="step-s">Análisis gustativo</div><div class="field"><label class="lbl">Dulzor</label><div class="chips">${c1('dulzor',['Seco','Semi seco','Medio','Dulce'])}</div></div><div class="field"><label class="lbl">Volumen / Cuerpo</label><div class="chips">${c1('volumen',['Bajo','Medio','Alto'])}</div></div><div class="field"><label class="lbl">Acidez</label><div class="chips">${c1('acidez',['Baja','Media','Alta','Punzante'])}</div></div><div class="field"><label class="lbl">Alcohol</label><div class="chips">${c1('alcohol',['Bajo','Medio','Alto','Cálido'])}</div></div><div class="field"><label class="lbl">Tanino</label><div class="chips">${c1('tanino',['Bajo','Medio','Alto','Muy astringente'])}</div></div><div class="field"><label class="lbl">Intensidad de sabor</label><div class="chips">${c1('intS',['Baja','Media','Alta'])}</div></div><div class="field"><label class="lbl">Perfil en boca</label><div class="chips">${cM('pB',['Frutado','Herbáceo','Floral','Especiado','Madera','Herbal','Otros'])}</div>${expander('pB','aB')}</div><div class="field"><label class="lbl">Complejidad</label><div class="chips">${c1('compB',['Simple','Media','Alta'])}</div></div><div class="row2"><div class="field"><label class="lbl">Persistencia</label><div class="chips" style="flex-direction:column;gap:6px">${c1('persistencia',['Corta','Media','Larga'])}</div></div><div class="field"><label class="lbl">Final</label><div class="chips" style="flex-direction:column;gap:6px">${c1('final',['Corto','Medio','Largo'])}</div></div></div>`;if(s===4)return`<div class="step-t">Cata comercial</div><div class="step-s">Puntuación y descripción</div><div class="field"><label class="lbl">Puntaje (escala 100)</label><div class="score-wrap"><div class="score-n" id="sn">${f.score||88}</div><div class="score-l" id="sl">${sL(f.score||88)}</div></div><input type="range" min="50" max="100" value="${f.score||88}" oninput="upScore(this.value)"></div><div class="field"><label class="lbl">Descripción / Cata comercial</label><textarea class="inp" placeholder="Carácter del vino, aromas dominantes, maridaje sugerido..." oninput="S.f.cataCom=this.value">${f.cataCom||''}</textarea></div>`;return''}
function c1(g,vs){return vs.map(v=>`<div class="chip${S.f[g]===v?' sel':''}" data-g="${g}" data-v="${v}">${v}</div>`).join('')}
function cM(g,vs){return vs.map(v=>`<div class="chip${(S.f[g]||[]).includes(v)?' sel':''}" data-g="${g}" data-m="1" data-v="${v}">${v}</div>`).join('')}

function bindChips(){document.querySelectorAll('.chip').forEach(el=>{el.addEventListener('click',function(){const g=this.dataset.g,v=this.dataset.v,m=this.dataset.m;if(!g)return;if(g==='cBase'){S.f.cBase=v;S.f.cShade=null;S.f.cHex=null;renderNueva();return}if(m){if(!S.f[g])S.f[g]=[];const i=S.f[g].indexOf(v);if(i>=0){S.f[g].splice(i,1);this.classList.remove('sel')}else{S.f[g].push(v);this.classList.add('sel')}if(g==='pN'||g==='pB')renderNueva()}else{S.f[g]=v;document.querySelectorAll('.chip[data-g="'+g+'"]').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')}})})}
function pickSh(n,h){S.f.cShade=n;S.f.cHex=h;renderNueva()}

function prevStep(){if(S.step>0){S.step--;renderNueva();document.getElementById('main').scrollTop=0}}

/* VER CATA */
function renderVer(){const c=S.catas.find(x=>x.id===S.id);if(!c){go('home');return}document.getElementById('hdr').innerHTML=`<div class="hrow"><div class="back" onclick="go('home')">‹</div><div><div class="htitle">Ficha de cata</div><div class="hsub">${fmt(c.created_at)}</div></div><div class="hacts"><div class="ibtn" onclick="shareCata('${c.id}')">↗</div><div class="ibtn" onclick="editCata('${c.id}')">✎</div></div></div>`;const dr=(l,v)=>v?`<div class="drow"><span class="dl">${l}</span><span class="dv">${Array.isArray(v)?v.join(', '):v}</span></div>`:'',cs=[c.color_base,c.color_shade].filter(Boolean).join(' ');document.getElementById('v-ver').innerHTML=`<div class="dwrap"><div class="dhero"><div class="hdot" style="background:${c.color_hex||'#B83050'}"></div><div><div class="hname">${c.etiqueta||c.bodega||'Sin nombre'}</div><div class="hmeta">${[c.varietal,c.anada,c.origen].filter(Boolean).join(' · ')}</div>${c.score?`<div class="hscore-big">${c.score} <small>${sL(c.score)}</small></div>`:''}</div></div>${radar(c)}<div class="dsec"><div class="dsec-t">¿Qué catamos?</div>${dr('Bodega',c.bodega)}${dr('Etiqueta',c.etiqueta)}${dr('Varietal',c.varietal)}${dr('Añada',c.anada)}${dr('Origen',c.origen)}${c.precio?dr('Precio','$'+c.precio):''}</div><div class="dsec"><div class="dsec-t">Vista</div>${dr('Apariencia',c.apariencia)}${dr('Intensidad',c.intensidad_vista)}${cs?`<div class="drow"><span class="dl">Color</span><span class="dv" style="display:flex;align-items:center;gap:8px"><span style="width:16px;height:16px;border-radius:50%;background:${c.color_hex||'#888'};display:inline-block;border:1px solid rgba(0,0,0,.1)"></span>${cs}</span></div>`:''}${c.reflejo?dr('Reflejo','Sí'):''}</div><div class="dsec"><div class="dsec-t">Nariz</div>${dr('Limpidez',c.limpidez)}${dr('Intensidad',c.intensidad_nariz)}${dr('Desarrollo',c.desarrollo)}${dr('Perfil',c.perfil_nariz)}${dr('Complejidad',c.complejidad_nariz)}${c.aromas_nariz?.length?`<div style="padding:8px 0"><div class="dl" style="margin-bottom:8px">Aromas</div><div class="atags">${c.aromas_nariz.map(a=>`<span class="atag">${a}</span>`).join('')}</div></div>`:''}</div><div class="dsec"><div class="dsec-t">Boca</div>${dr('Dulzor',c.dulzor)}${dr('Volumen',c.volumen)}${dr('Acidez',c.acidez)}${dr('Alcohol',c.alcohol)}${dr('Tanino',c.tanino)}${dr('Intensidad',c.intensidad_sabor)}${dr('Perfil',c.perfil_boca)}${dr('Complejidad',c.complejidad_boca)}${dr('Persistencia',c.persistencia)}${dr('Final',c.final)}${c.aromas_boca?.length?`<div style="padding:8px 0"><div class="dl" style="margin-bottom:8px">Aromas en boca</div><div class="atags">${c.aromas_boca.map(a=>`<span class="atag">${a}</span>`).join('')}</div></div>`:''}</div>${c.cata_com?`<div class="dsec"><div class="dsec-t">Cata comercial</div><div class="ccom">${c.cata_com}</div></div>`:''}<div class="dacts"><button class="btn-share" onclick="shareCata('${c.id}')">↗ Compartir</button><button class="btn btn-g" style="flex:1" onclick="editCata('${c.id}')">✎ Editar</button><button class="btn-del" onclick="deleteCata('${c.id}')">🗑</button></div></div>`}
function radar(c){const ax=[{l:'Dulzor',v:mV(c.dulzor,['Seco','Semi seco','Medio','Dulce'])},{l:'Acidez',v:mV(c.acidez,['Baja','Media','Alta','Punzante'])},{l:'Tanino',v:mV(c.tanino,['Bajo','Medio','Alto','Muy astringente'])},{l:'Alcohol',v:mV(c.alcohol,['Bajo','Medio','Alto','Cálido'])},{l:'Cuerpo',v:mV(c.volumen,['Bajo','Medio','Alto'])},{l:'Complejidad',v:mV(c.complejidad_boca,['Simple','Media','Alta'])}];if(ax.every(a=>a.v===0))return'';const cx=130,cy=120,R=80,n=ax.length,ag=i=>(Math.PI*2*i/n)-Math.PI/2,px=(i,r)=>cx+r*Math.cos(ag(i)),py=(i,r)=>cy+r*Math.sin(ag(i));let g='',lb='',dp=[];for(let r=1;r<=3;r++){let p=[];for(let i=0;i<n;i++)p.push(px(i,R*r/3)+','+py(i,R*r/3));g+=`<polygon points="${p.join(' ')}" fill="none" stroke="rgba(0,0,0,.06)"/>`}for(let i=0;i<n;i++){g+=`<line x1="${cx}" y1="${cy}" x2="${px(i,R)}" y2="${py(i,R)}" stroke="rgba(0,0,0,.04)"/>`;lb+=`<text x="${px(i,R+22)}" y="${py(i,R+22)}" text-anchor="middle" dominant-baseline="middle">${ax[i].l}</text>`;dp.push(px(i,R*ax[i].v/3)+','+py(i,R*ax[i].v/3))}return`<div class="radar-wrap"><svg width="260" height="260" viewBox="0 0 260 240">${g}${lb}<polygon points="${dp.join(' ')}" fill="rgba(114,47,55,.12)" stroke="var(--wine)" stroke-width="2"/>${ax.map((_,i)=>`<circle cx="${px(i,R*ax[i].v/3)}" cy="${py(i,R*ax[i].v/3)}" r="4" fill="var(--wine)"/>`).join('')}</svg></div>`}
function mV(v,sc){if(!v)return 0;const i=sc.indexOf(v);return i<0?0:i+1}
function editCata(id){const c=S.catas.find(x=>x.id===id);if(!c)return;S.f={_id:c.id,bodega:c.bodega,etiqueta:c.etiqueta,varietal:c.varietal,añada:c.anada,origen:c.origen,precio:c.precio,apariencia:c.apariencia,intV:c.intensidad_vista,cBase:c.color_base,cShade:c.color_shade,cHex:c.color_hex,reflejo:c.reflejo,limpidez:c.limpidez,intN:c.intensidad_nariz,desarrollo:c.desarrollo,pN:c.perfil_nariz||[],compN:c.complejidad_nariz,aN:c.aromas_nariz||[],dulzor:c.dulzor,volumen:c.volumen,acidez:c.acidez,alcohol:c.alcohol,tanino:c.tanino,intS:c.intensidad_sabor,pB:c.perfil_boca||[],compB:c.complejidad_boca,aB:c.aromas_boca||[],persistencia:c.persistencia,final:c.final,score:c.score,cataCom:c.cata_com};S.step=0;S.view='nueva';render()}

/* BIBLIOTECA / APRENDER */
function renderRef(){
  document.getElementById('hdr').innerHTML=`<div class="hrow">${S.refView!=='main'?`<div class="back" onclick="S.refView='main';renderRef()">‹</div>`:''}<div><div class="htitle">Aprender</div><div class="hsub">${S.refView==='main'?'Referencia y estudio':S.refView==='flash'?'Flashcards':S.refView==='aromas'?'Aromas':S.refView==='colors'?'Colores':'Puntuación'}</div></div></div>`
  if(S.refView==='main'){document.getElementById('v-ref').innerHTML=`<div class="rwrap">
    <div class="aroma-grid">
      <div class="aroma-card" onclick="S.refView='flash';S.fcIdx=0;S.fcFlipped=false;renderRef()"><div class="aroma-card-bar" style="background:var(--wine)"></div><div class="aroma-card-name">🃏 Flashcards</div><div class="aroma-card-count">Estudiá aromas y colores</div></div>
      <div class="aroma-card" onclick="S.refView='aromas';renderRef()"><div class="aroma-card-bar" style="background:var(--gold)"></div><div class="aroma-card-name">👃 Aromas</div><div class="aroma-card-count">${Object.values(PA).flat().reduce((a,c)=>a+c.i.length,0)} aromas en 7 perfiles</div></div>
      <div class="aroma-card" onclick="S.refView='colors';renderRef()"><div class="aroma-card-bar" style="background:#B83050"></div><div class="aroma-card-name">🎨 Colores</div><div class="aroma-card-count">${Object.values(COLORES).flat().length} tonos</div></div>
      <div class="aroma-card" onclick="S.refView='scores';renderRef()"><div class="aroma-card-bar" style="background:var(--dim)"></div><div class="aroma-card-name">🏆 Puntuación</div><div class="aroma-card-count">Escala de 100 puntos</div></div>
    </div></div>`}
  else if(S.refView==='flash') renderFlash()
  else if(S.refView==='aromas'){document.getElementById('v-ref').innerHTML=`<div class="rwrap">${Object.entries(PA).map(([p,cats])=>`<div class="rsec"><div class="rtitle">${p}</div><div class="rrule"></div>${cats.map(cat=>`<div class="aroma-detail"><div class="aroma-detail-title">${cat.c}</div><div class="chips">${cat.i.map(a=>`<div class="chip" style="pointer-events:none">${a}</div>`).join('')}</div></div>`).join('')}</div>`).join('')}</div>`}
  else if(S.refView==='colors'){document.getElementById('v-ref').innerHTML=`<div class="rwrap">${Object.entries(COLORES).map(([b,sh])=>`<div class="rsec"><div class="rtitle">${b}</div><div class="rrule"></div><div style="display:flex;gap:14px;flex-wrap:wrap">${sh.map(s=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;border-radius:50%;background:${s.h};border:2px solid rgba(0,0,0,.08)"></div><div style="font-size:11px;color:var(--dim);text-align:center">${s.n}</div></div>`).join('')}</div></div>`).join('')}</div>`}
  else if(S.refView==='scores'){document.getElementById('v-ref').innerHTML=`<div class="rwrap"><div class="rsec"><div class="rtitle">Escala de puntuación</div><div class="rrule"></div>${[[97,100,'Perfección'],[93,96,'Excepcional'],[90,92,'Sobresaliente'],[87,89,'Muy Bueno'],[83,86,'Bueno +'],[80,82,'Bueno'],[75,79,'Aceptable'],[50,74,'Por debajo del promedio']].map(([a,b,l])=>`<div class="drow"><span class="dl">${a}–${b}</span><span class="dv">${l}</span></div>`).join('')}</div></div>`}
}

/* FLASHCARDS */
function getFlashDeck(){
  const deck=[]
  Object.entries(PA).forEach(([prof,cats])=>{cats.forEach(cat=>{cat.i.forEach(a=>{deck.push({q:a,a:cat.c,hint:prof})})})})
  Object.entries(COLORES).forEach(([base,shades])=>{shades.forEach(sh=>{deck.push({q:`${base} ${sh.n}`,a:`Color de vino`,hint:sh.h,isColor:true})})})
  // Shuffle
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]]}
  return deck
}
let flashDeck=[]
function renderFlash(){
  if(!flashDeck.length)flashDeck=getFlashDeck()
  const card=flashDeck[S.fcIdx]
  const total=flashDeck.length
  document.getElementById('v-ref').innerHTML=`<div class="rwrap"><div class="fc-container">
    <div class="fc-counter">${S.fcIdx+1} / ${total}</div>
    <div class="fc-card${S.fcFlipped?' flipped':''}" onclick="S.fcFlipped=!S.fcFlipped;renderFlash()">
      <div class="fc-inner">
        <div class="fc-front">
          <div class="fc-label">¿En qué categoría está?</div>
          ${card.isColor?`<div style="width:60px;height:60px;border-radius:50%;background:${card.hint};border:3px solid rgba(255,255,255,.3);margin-bottom:12px"></div>`:''}
          <div class="fc-question">${card.q}</div>
        </div>
        <div class="fc-back">
          <div class="fc-answer">${card.a}</div>
          <div class="fc-hint">${card.isColor?card.q:'Perfil: '+card.hint}</div>
        </div>
      </div>
    </div>
    <div class="fc-tap">Tocá la carta para dar vuelta</div>
    <div class="fc-nav">
      <button class="fc-btn fc-btn-prev" onclick="event.stopPropagation();prevCard()">← Anterior</button>
      <button class="fc-btn fc-btn-next" onclick="event.stopPropagation();nextCard()">Siguiente →</button>
    </div>
    <div style="margin-top:16px"><button class="fc-btn fc-btn-prev" onclick="flashDeck=getFlashDeck();S.fcIdx=0;S.fcFlipped=false;renderFlash()" style="width:auto;padding:8px 16px">🔀 Mezclar de nuevo</button></div>
  </div></div>`
}
function nextCard(){S.fcIdx=(S.fcIdx+1)%flashDeck.length;S.fcFlipped=false;renderFlash()}
function prevCard(){S.fcIdx=(S.fcIdx-1+flashDeck.length)%flashDeck.length;S.fcFlipped=false;renderFlash()}

/* PROFILE */
function renderProfile(){const n=S.user?.user_metadata?.name||S.user?.email?.split('@')[0]||'';document.getElementById('hdr').innerHTML='<div class="hrow"><div><div class="htitle">Perfil</div></div></div>';document.getElementById('v-profile').innerHTML=`<div class="pwrap"><div class="pavatar">🍷</div><div class="pname">${n}</div><div class="pemail">${S.user?.email}</div><div class="pcard">${[[S.catas.length,'Catas registradas'],[avg(),'Puntaje promedio']].map(([n,l])=>`<div class="drow"><span class="dl">${l}</span><span class="dv" style="color:var(--wine);font-family:'Fraunces',serif;font-size:20px">${n}</span></div>`).join('')}</div><button class="btn-out" onclick="signOut()">Cerrar sesión</button></div>`}

/* BOOTSTRAP */
async function init(){const{data:{session}}=await db.auth.getSession();if(session){S.user=session.user;await loadCatas();document.getElementById('auth').style.display='none';document.getElementById('wrap').style.display='flex';render()}db.auth.onAuthStateChange(async(ev,session)=>{S.user=session?.user||null;if(S.user){await loadCatas();document.getElementById('auth').style.display='none';document.getElementById('wrap').style.display='flex';render()}else{S.catas=[];document.getElementById('auth').style.display='flex';document.getElementById('wrap').style.display='none'}})}
init()
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})
</script>
