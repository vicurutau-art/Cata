<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF5EE">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Cata">
  <link rel="manifest" href="manifest.json">
  <title>Cata · Sommelier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400;1,9..144,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#FAF5EE;--bg2:#F2ECE2;--card:#fff;--cb:rgba(92,26,42,.08);--shadow:0 2px 16px rgba(44,24,16,.06);--wine:#722F37;--wine-lt:#9B4A54;--wine-dk:#4A1520;--gold:#C4942A;--text:#2C1810;--dim:#8B7355;--dim2:#C4B49A;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);--sw:220px}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px}

    /* ── LAYOUT ── */
    #wrap{height:100%;display:flex;flex-direction:row;max-width:1280px;margin:0 auto;background:var(--bg);position:relative}
    .sidebar{display:none}
    #main-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    header{flex-shrink:0;padding:14px 20px 10px;padding-top:calc(14px + var(--st));background:var(--bg)}
    main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--bg)}
    nav.bnav{flex-shrink:0;display:flex;background:#fff;border-top:1px solid rgba(92,26,42,.08);padding-bottom:var(--sb)}

    /* ── DESKTOP ── */
    @media(min-width:900px){
      body{overflow:auto}
      html,body{height:100%}
      #wrap{box-shadow:0 0 60px rgba(0,0,0,.06);height:100vh;overflow:hidden}
      .sidebar{display:flex;flex-direction:column;width:var(--sw);flex-shrink:0;background:#fff;border-right:1px solid var(--cb);padding:0;position:relative;z-index:10}
      nav.bnav{display:none}
      .sb-brand{padding:28px 24px 24px;border-bottom:1px solid var(--cb)}
      .sb-logo{font-family:'Fraunces',serif;font-style:italic;font-size:32px;font-weight:300;color:var(--wine);line-height:1}
      .sb-sub{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:.04em}
      .sb-nav{padding:16px 12px;flex:1}
      .sb-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;cursor:pointer;color:var(--dim);font-size:14px;font-weight:500;transition:.15s;margin-bottom:2px;user-select:none}
      .sb-item:hover{background:var(--bg2)}
      .sb-item.active{background:rgba(114,47,55,.08);color:var(--wine)}
      .sb-item .sb-ic{font-size:18px;width:22px;text-align:center}
      .sb-foot{padding:16px 12px;border-top:1px solid var(--cb)}
      .sb-user{font-size:12px;color:var(--dim);padding:8px 14px}
      .fnav{left:var(--sw);right:0;max-width:none}
      .fab{right:32px}
      #toast{left:calc(var(--sw) + 50%)}
      .fbody{padding-bottom:100px}
      /* 2-col layout for cata list */
      .clist{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 40px}
      .clist>.empty{grid-column:1/-1}
      .clist>.fab{display:none}
      .home-fab-desktop{display:flex!important}
    }

    /* ── AUTH ── */
    #auth{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;background:linear-gradient(180deg,#FAF5EE 0%,#F0E8DC 100%)}
    .auth-logo{font-family:'Fraunces',serif;font-style:italic;font-size:80px;font-weight:300;color:var(--wine);line-height:1;margin-bottom:6px}
    .auth-tag{font-size:14px;color:var(--dim);letter-spacing:.06em;margin-bottom:44px}
    .auth-card{width:100%;max-width:380px;background:#fff;border:1px solid var(--cb);border-radius:24px;padding:28px 22px;box-shadow:var(--shadow)}
    .atabs{display:flex;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:22px}
    .atab{flex:1;padding:9px;text-align:center;border-radius:8px;font-size:14px;font-weight:500;color:var(--dim);cursor:pointer;transition:.2s;user-select:none}
    .atab.active{background:#fff;color:var(--wine);box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .auth-err{background:rgba(196,60,60,.08);border:1px solid rgba(196,60,60,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#A04040;text-align:left;margin-bottom:12px}
    .auth-ok{background:rgba(60,140,80,.08);border:1px solid rgba(60,140,80,.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#2A7A3A;text-align:left;margin-bottom:12px}
    .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:6px;display:block;font-weight:500}
    .inp{width:100%;background:var(--bg);border:1px solid rgba(92,26,42,.12);border-radius:12px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:.2s;margin-bottom:12px}
    .inp:focus{border-color:var(--wine);background:#fff}.inp::placeholder{color:var(--dim2)}
    textarea.inp{resize:vertical;min-height:110px;margin-bottom:0}
    .btn-grad{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--wine),var(--wine-dk));color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:.15s;margin-top:4px}
    .btn-grad:active{transform:scale(.97)}.spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── VIEWS ── */
    .view{display:none}.view.active{display:block;animation:vup .25s ease}
    @keyframes vup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .hrow{display:flex;align-items:center;gap:12px}
    .back{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cb);border-radius:50%;cursor:pointer;color:var(--wine);font-size:20px;flex-shrink:0;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .back:active{transform:scale(.88)}
    .htitle{font-family:'Fraunces',serif;font-style:italic;font-size:22px;font-weight:400;color:var(--wine-dk)}
    .hsub{font-size:12px;color:var(--dim);margin-top:1px}
    .hacts{margin-left:auto;display:flex;gap:8px}
    .ibtn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--cb);border-radius:50%;cursor:pointer;font-size:15px;transition:.15s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .ibtn:active{transform:scale(.88)}
    .prog{display:flex;gap:5px;margin-top:12px}.ps{height:3px;flex:1;border-radius:2px;background:var(--bg2);transition:background .3s}
    .ps.done{background:var(--gold)}.ps.cur{background:var(--wine)}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;cursor:pointer;color:var(--dim);font-size:10px;letter-spacing:.06em;text-transform:uppercase;gap:4px;font-weight:500;transition:.15s;user-select:none}
    .ni-ic{font-size:20px}.ni.active{color:var(--wine)}.ni:active{transform:scale(.88)}

    /* ── HOME ── */
    .home-hi{padding:20px 20px 12px}
    .home-g{font-family:'Fraunces',serif;font-style:italic;font-size:36px;font-weight:300;line-height:1.1}
    .home-g strong{font-weight:500;color:var(--wine)}
    .home-s{font-size:13px;color:var(--dim);margin-top:5px}
    .stats{display:flex;gap:10px;padding:0 20px 6px}
    .stat{flex:1;background:#fff;border:1px solid var(--cb);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:.15s}
    .stat:active{transform:scale(.97)}
    .stat-n{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--wine)}
    .stat-l{font-size:10px;color:var(--dim);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .stats-link{text-align:right;padding:6px 22px 12px;font-size:12px;color:var(--wine);cursor:pointer;font-weight:500}
    .swi{position:relative;padding:0 20px 14px}.swi::before{content:'🔍';position:absolute;left:34px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
    .search{width:100%;background:#fff;border:1px solid var(--cb);border-radius:12px;padding:11px 16px 11px 42px;color:var(--text);font-size:14px;outline:none;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.03)}
    .search:focus{border-color:var(--wine)}.search::placeholder{color:var(--dim2)}
    .search-tip{padding:0 20px 10px;font-size:12px;color:var(--dim2)}
    .clist{padding:0 16px 120px;display:flex;flex-direction:column;gap:10px}
    .cc{background:#fff;border:1px solid var(--cb);border-radius:18px;padding:15px 16px;cursor:pointer;transition:.15s;display:flex;gap:14px;align-items:center;box-shadow:var(--shadow)}
    .cc:active{transform:scale(.98);border-color:var(--wine-lt)}
    .cc-dot{width:48px;height:48px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.06)}
    .cc-info{flex:1;min-width:0}.cc-name{font-family:'Fraunces',serif;font-size:17px;font-weight:400;font-style:italic;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cc-meta{font-size:12px;color:var(--dim);margin-top:2px}
    .cc-score{font-family:'Fraunces',serif;font-size:28px;font-weight:400;color:var(--wine);flex-shrink:0}
    .fab{position:fixed;bottom:calc(76px + var(--sb));right:20px;width:56px;height:56px;background:linear-gradient(135deg,var(--wine),var(--wine-dk));border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 6px 24px rgba(114,47,55,.35);transition:.15s;z-index:50}
    .fab:active{transform:scale(.9)}
    .home-fab-desktop{display:none;position:static;margin:16px 20px 0;width:auto;height:auto;border-radius:12px;padding:14px;font-size:15px;font-weight:500;box-shadow:0 4px 16px rgba(114,47,55,.25)}
    .empty{text-align:center;padding:60px 40px}.empty-ic{font-size:56px;opacity:.3;margin-bottom:16px}
    .empty-t{font-family:'Fraunces',serif;font-style:italic;font-size:22px;color:var(--dim);margin-bottom:8px}
    .empty-s{font-size:13px;color:var(--dim2);line-height:1.6}

    /* ── FORM ── */
    .fbody{padding:8px 20px 145px}
    .step-t{font-family:'Fraunces',serif;font-style:italic;font-size:32px;font-weight:300;color:var(--wine);margin-bottom:3px}
    .step-s{font-size:13px;color:var(--dim);margin-bottom:24px}
    .field{margin-bottom:20px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{padding:8px 15px;border-radius:100px;border:1px solid rgba(92,26,42,.15);background:#fff;color:var(--dim);font-size:14px;cursor:pointer;transition:.12s;user-select:none}
    .chip:active{transform:scale(.93)}.chip.sel{background:var(--wine);border-color:var(--wine);color:#fff}
    .color-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .color-opt{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
    .color-circle{width:50px;height:50px;border-radius:50%;border:3px solid transparent;transition:.15s}
    .color-circle:active{transform:scale(.88)}.color-circle.sel{border-color:var(--wine);transform:scale(1.08);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--wine)}
    .color-lbl{font-size:10px;color:var(--dim);text-align:center;line-height:1.2;max-width:65px}
    .color-hint{margin-top:10px;padding:10px 14px;background:rgba(114,47,55,.06);border:1px solid rgba(114,47,55,.15);border-radius:10px;font-size:13px;color:var(--wine)}
    .expand-block{margin-top:12px;padding:10px 0 4px 14px;border-left:3px solid rgba(114,47,55,.2);animation:vup .2s ease}
    .expand-header{font-size:11px;color:var(--wine);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .expand-cat{margin-bottom:12px}.expand-cat-t{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px}
    .score-wrap{text-align:center;padding:10px 0}
    .score-n{font-family:'Fraunces',serif;font-size:96px;font-weight:300;line-height:1;color:var(--wine)}
    .score-l{font-size:14px;color:var(--dim);margin-top:4px;font-style:italic}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--bg2);outline:none;margin:16px 0;cursor:pointer}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--wine);cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(114,47,55,.3)}
    .fnav{position:fixed;bottom:calc(58px + var(--sb));left:0;right:0;max-width:480px;margin:0 auto;padding:10px 20px 14px;background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;gap:10px;z-index:40}
    .btn{flex:1;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:500;cursor:pointer;transition:.15s}
    .btn:active{transform:scale(.97)}
    .btn-p{background:linear-gradient(135deg,var(--wine),var(--wine-dk));color:#fff;box-shadow:0 4px 16px rgba(114,47,55,.25)}
    .btn-g{background:#fff;border:1px solid var(--cb);color:var(--dim);flex:0 0 auto;padding:15px 18px}
    .btn-s{background:linear-gradient(135deg,var(--gold),#A07A18);color:#fff}

    /* ── FOTO ── */
    .foto-upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:2px dashed rgba(114,47,55,.25);border-radius:12px;background:rgba(114,47,55,.03);color:var(--wine);font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
    .foto-upload-btn:active{background:rgba(114,47,55,.07)}
    .foto-preview-img{width:100%;border-radius:12px;max-height:180px;object-fit:cover;margin-top:10px;border:1px solid var(--cb);display:block}
    .foto-ok{font-size:12px;color:var(--wine);margin-top:6px;font-style:italic}
    .foto-detail{width:100%;border-radius:16px;overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);position:relative}
    .foto-detail img{width:100%;max-height:240px;object-fit:cover;display:block}
    .foto-detail-label{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.4));color:#fff;font-size:12px;font-style:italic}

    /* ── DETAIL ── */
    .dwrap{padding:0 20px 120px}
    .dhero{display:flex;align-items:center;gap:16px;padding:16px 0 20px;border-bottom:1px solid var(--cb);margin-bottom:20px}
    .hdot{width:68px;height:68px;border-radius:50%;border:3px solid rgba(0,0,0,.06);flex-shrink:0}
    .hname{font-family:'Fraunces',serif;font-style:italic;font-size:26px;font-weight:400;color:var(--text)}
    .hmeta{font-size:13px;color:var(--dim);margin-top:3px}
    .hscore-big{font-family:'Fraunces',serif;font-size:36px;font-weight:400;color:var(--wine);margin-top:4px}
    .hscore-big small{font-size:13px;color:var(--dim);font-weight:400}
    .dsec{margin-bottom:22px}
    .dsec-t{font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:var(--wine);padding-bottom:8px;border-bottom:1px solid var(--cb);margin-bottom:12px;font-weight:600}
    .drow{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:14px;gap:12px}
    .dl{color:var(--dim);flex-shrink:0}.dv{color:var(--text);text-align:right}
    .atags{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0}
    .atag{padding:5px 12px;background:rgba(114,47,55,.06);border:1px solid rgba(114,47,55,.12);border-radius:100px;font-size:12px;color:var(--wine);cursor:pointer}
    .ccom{font-size:14px;line-height:1.75;color:var(--text);font-style:italic;background:rgba(114,47,55,.04);padding:16px;border-radius:12px;border-left:3px solid var(--wine)}
    .dacts{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
    .btn-action{padding:12px 14px;border-radius:10px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500;border:none;white-space:nowrap}
    .btn-action:active{transform:scale(.95)}
    .btn-pdf{background:rgba(114,47,55,.08);border:1px solid rgba(114,47,55,.2);color:var(--wine)}
    .btn-share{background:rgba(196,148,42,.08);border:1px solid rgba(196,148,42,.25);color:var(--gold)}
    .btn-edit{background:#fff;border:1px solid var(--cb);color:var(--dim);flex:1}
    .btn-del{background:#fff;border:1px solid rgba(196,60,60,.2);color:#A04040}
    .historial-card{background:var(--bg2);border:1px solid var(--cb);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.15s;display:flex;gap:12px;align-items:center;margin-bottom:8px}
    .historial-card:active{transform:scale(.97)}
    .historial-dot{width:36px;height:36px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.06)}
    .historial-score{font-family:'Fraunces',serif;font-size:22px;font-weight:400;color:var(--wine);flex-shrink:0}
    .radar-wrap{display:flex;justify-content:center;padding:12px 0 4px}
    .radar-wrap svg text{font-family:'DM Sans',sans-serif;fill:var(--dim);font-size:10px}

    /* ── BIBLIOTECA / APRENDER ── */
    .rwrap{padding:8px 20px 110px}.rsec{margin-bottom:28px}
    .rtitle{font-family:'Fraunces',serif;font-style:italic;font-size:22px;font-weight:300;color:var(--wine);margin-bottom:3px}
    .rrule{height:2px;background:linear-gradient(to right,var(--wine),transparent);margin:8px 0 14px;border-radius:1px}
    .aroma-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(min-width:900px){.aroma-grid{grid-template-columns:repeat(3,1fr)}}
    .aroma-card{background:#fff;border:1px solid var(--cb);border-radius:14px;padding:14px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
    .aroma-card:active{transform:scale(.97)}.aroma-card-bar{height:4px;border-radius:2px;margin-bottom:10px}
    .aroma-card-name{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px}
    .aroma-card-count{font-size:11px;color:var(--dim)}
    .aroma-detail{background:#fff;border:1px solid var(--cb);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
    .aroma-detail-title{font-family:'Fraunces',serif;font-size:18px;color:var(--wine);margin-bottom:12px;font-style:italic}

    /* ── VARIETALES (Wine Folly style) ── */
    .vt-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .vt-tab{padding:8px 16px;border-radius:100px;border:1px solid var(--cb);background:#fff;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;color:var(--dim)}
    .vt-tab.active{color:#fff}
    .vt-tab.tb{background:linear-gradient(135deg,#E8D018,#C88800);border-color:transparent}
    .vt-tab.tr{background:linear-gradient(135deg,#A01840,#620818);border-color:transparent}
    .vt-list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(min-width:900px){.vt-list{grid-template-columns:repeat(3,1fr)}}
    .vt-card{background:#fff;border:1px solid var(--cb);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
    .vt-card:active{transform:scale(.97)}
    .vt-card-header{height:6px}
    .vt-card-body{padding:14px}
    .vt-card-name{font-family:'Fraunces',serif;font-size:16px;font-weight:500;font-style:italic;color:var(--text);margin-bottom:3px}
    .vt-card-region{font-size:11px;color:var(--dim)}
    .vt-card-aromas{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
    .vt-card-ar{font-size:11px;background:var(--bg2);padding:3px 8px;border-radius:100px;color:var(--dim)}
    /* Detail page */
    .vt-detail-header{padding:24px 20px 20px;margin-bottom:0;border-bottom:1px solid var(--cb)}
    .vt-detail-title{font-family:'Fraunces',serif;font-style:italic;font-size:36px;font-weight:300;line-height:1;margin-bottom:4px}
    .vt-detail-region{font-size:13px;color:var(--dim)}
    @media(min-width:900px){
      .vt-detail-inner{display:grid;grid-template-columns:260px 1fr;gap:0}
      .vt-detail-left{padding:20px;border-right:1px solid var(--cb)}
      .vt-detail-right{padding:20px}

</head>

/* ══ ROUTING ══ */
function go(v,id){if(v==='nueva'){S.f={pN:[],pB:[],aN:[],aB:[]};S.step=0}if(v==='ver'&&id)S.id=id;if(v==='ref'&&!id)S.refView='main';S.view=v;render()}

function render(){
  // Bottom nav (mobile)
  ['home','nueva','ref','profile'].forEach(v=>{const e=document.getElementById('ni-'+v);if(e)e.classList.toggle('active',S.view===v)})
  // Sidebar (desktop)
  const sbMap={home:'sbi-home',nueva:'sbi-nueva',ref:'sbi-ref',stats:'sbi-stats',profile:'sbi-profile'}
  Object.entries(sbMap).forEach(([v,id])=>{const e=document.getElementById(id);if(e)e.classList.toggle('active',S.view===v)})
  // Update sidebar user
  const su=document.getElementById('sb-user-label')
  if(su)su.textContent=S.user?.user_metadata?.name||S.user?.email?.split('@')[0]||''
  // Show view
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
  const vid={'ver':'v-ver','stats':'v-stats'}[S.view]||('v-'+S.view)
  const el=document.getElementById(vid)
  if(el)el.classList.add('active')
  ;({home:renderHome,nueva:renderNueva,ver:renderVer,ref:renderRef,profile:renderProfile,stats:renderStats})[S.view]?.()
}

function renderNueva(){const s=S.step,last=s===STEPS.length-1;document.getElementById('hdr').innerHTML=`<div class="hrow"><div class="back" onclick="${s===0?"go('home')":"prevStep()"}">${s===0?'✕':'‹'}</div><div><div class="htitle">${STEPS[s].t}</div><div class="hsub">${STEPS[s].s}</div></div></div><div class="prog">${STEPS.map((_,i)=>`<div class="ps ${i<s?'done':i===s?'cur':''}"></div>`).join('')}</div>`;document.getElementById('v-nueva').innerHTML=`<div class="fbody">${buildStep(s)}</div><div class="fnav">${s>0?'<button class="btn btn-g" onclick="prevStep()">Atrás</button>':''}<button class="btn ${last?'btn-s':'btn-p'}" onclick="${last?'saveCata()':'nextStep()'}">${last?'✓ Guardar':'Continuar →'}</button></div>`;bindChips()}
function buildStep(s){const f=S.f;

  if(s===1){const sb=f.cBase;return`<div class="step-t">Vista</div><div class="step-s">Examen visual</div><div class="field"><label class="lbl">Apariencia</label><div class="chips">${c1('apariencia',['Brillante','Opaco','Turbio'])}</div></div><div class="field"><label class="lbl">Intensidad</label><div class="chips">${c1('intV',['Leve','Media','Alta'])}</div></div><div class="field"><label class="lbl">Color</label><div class="chips">${Object.keys(COLORES).map(b=>`<div class="chip${f.cBase===b?' sel':''}" data-g="cBase" data-v="${b}">${b}</div>`).join('')}</div>${sb?`<div class="color-row">${COLORES[sb].map(sh=>`<div class="color-opt" onclick="pickSh('${sh.n.replace(/'/g,"\\'")}','${sh.h}')"><div class="color-circle${f.cShade===sh.n?' sel':''}" style="background:${sh.h}"></div><div class="color-lbl">${sh.n}</div></div>`).join('')}</div>${f.cShade?`<div class="color-hint">✓ ${sb} ${f.cShade}</div>`:''}`:''}  </div><div class="field"><label class="lbl">Reflejo</label><div class="chips"><div class="chip${f.reflejo?' sel':''}" onclick="S.f.reflejo=!S.f.reflejo;renderNueva()">Presenta reflejo</div></div></div>`}
  if(s===2)return`<div class="step-t">Nariz</div><div class="step-s">Perfil olfativo</div><div class="field"><label class="lbl">Limpidez</label><div class="chips">${c1('limpidez',['Limpio','Defectuoso'])}</div></div><div class="field"><label class="lbl">Intensidad</label><div class="chips">${c1('intN',['Neutra','Baja','Media','Alta'])}</div></div><div class="field"><label class="lbl">Desarrollo</label><div class="chips">${c1('desarrollo',['Joven','En desarrollo','Evolucionado'])}</div></div><div class="field"><label class="lbl">Perfil</label><div class="chips">${cM('pN',['Frutado','Herbáceo','Floral','Especiado','Madera','Herbal','Otros'])}</div>${expander('pN','aN')}</div><div class="field"><label class="lbl">Complejidad</label><div class="chips">${c1('compN',['Simple','Media','Alta'])}</div></div>`
  if(s===3)return`<div class="step-t">Boca</div><div class="step-s">Análisis gustativo</div><div class="field"><label class="lbl">Dulzor</label><div class="chips">${c1('dulzor',['Seco','Semi seco','Medio','Dulce'])}</div></div><div class="field"><label class="lbl">Volumen / Cuerpo</label><div class="chips">${c1('volumen',['Bajo','Medio','Alto'])}</div></div><div class="field"><label class="lbl">Acidez</label><div class="chips">${c1('acidez',['Baja','Media','Alta','Punzante'])}</div></div><div class="field"><label class="lbl">Alcohol</label><div class="chips">${c1('alcohol',['Bajo','Medio','Alto','Cálido'])}</div></div><div class="field"><label class="lbl">Tanino</label><div class="chips">${c1('tanino',['Bajo','Medio','Alto','Muy astringente'])}</div></div><div class="field"><label class="lbl">Intensidad de sabor</label><div class="chips">${c1('intS',['Baja','Media','Alta'])}</div></div><div class="field"><label class="lbl">Perfil en boca</label><div class="chips">${cM('pB',['Frutado','Herbáceo','Floral','Especiado','Madera','Herbal','Otros'])}</div>${expander('pB','aB')}</div><div class="field"><label class="lbl">Complejidad</label><div class="chips">${c1('compB',['Simple','Media','Alta'])}</div></div><div class="row2"><div class="field"><label class="lbl">Persistencia</label><div class="chips" style="flex-direction:column;gap:6px">${c1('persistencia',['Corta','Media','Larga'])}</div></div><div class="field"><label class="lbl">Final</label><div class="chips" style="flex-direction:column;gap:6px">${c1('final',['Corto','Medio','Largo'])}</div></div></div>`
  if(s===4)return`<div class="step-t">Cata comercial</div><div class="step-s">Puntuación y descripción</div><div class="field"><label class="lbl">Puntaje (escala 100)</label><div class="score-wrap"><div class="score-n" id="sn">${f.score||88}</div><div class="score-l" id="sl">${sL(f.score||88)}</div></div><input type="range" min="50" max="100" value="${f.score||88}" oninput="upScore(this.value)"></div><div class="field"><label class="lbl">Descripción / Cata comercial</label><textarea class="inp" placeholder="Carácter del vino, aromas dominantes, maridaje sugerido..." oninput="S.f.cataCom=this.value">${f.cataCom||''}</textarea></div>`
  return''}
function c1(g,vs){return vs.map(v=>`<div class="chip${S.f[g]===v?' sel':''}" data-g="${g}" data-v="${v}">${v}</div>`).join('')}
function cM(g,vs){return vs.map(v=>`<div class="chip${(S.f[g]||[]).includes(v)?' sel':''}" data-g="${g}" data-m="1" data-v="${v}">${v}</div>`).join('')}
function expander(pk,ak){const sel=S.f[pk]||[];if(!sel.length)return'';return sel.map(p=>{const cats=PA[p];if(!cats)return'';return`<div class="expand-block"><div class="expand-header">⤷ ${p}</div>${cats.map(cat=>`<div class="expand-cat"><div class="expand-cat-t" style="color:${cat.clr}">${cat.c}</div><div class="chips">${cat.i.map(a=>`<div class="chip${(S.f[ak]||[]).includes(a)?' sel':''}" data-g="${ak}" data-m="1" data-v="${a}">${a}</div>`).join('')}</div></div>`).join('')}</div>`}).join('')}
function bindChips(){document.querySelectorAll('.chip').forEach(el=>{el.addEventListener('click',function(){const g=this.dataset.g,v=this.dataset.v,m=this.dataset.m;if(!g)return;if(g==='cBase'){S.f.cBase=v;S.f.cShade=null;S.f.cHex=null;renderNueva();return}if(m){if(!S.f[g])S.f[g]=[];const i=S.f[g].indexOf(v);if(i>=0){S.f[g].splice(i,1);this.classList.remove('sel')}else{S.f[g].push(v);this.classList.add('sel')}if(g==='pN'||g==='pB')renderNueva()}else{S.f[g]=v;document.querySelectorAll('.chip[data-g="'+g+'"]').forEach(x=>x.classList.remove('sel'));this.classList.add('sel')}})})}
function pickSh(n,h){S.f.cShade=n;S.f.cHex=h;renderNueva()}
function upScore(v){S.f.score=+v;const n=document.getElementById('sn'),l=document.getElementById('sl');if(n){n.textContent=v;l.textContent=sL(v)}}
function nextStep(){if(S.step<STEPS.length-1){S.step++;renderNueva();document.getElementById('main').scrollTop=0}}
function prevStep(){if(S.step>0){S.step--;renderNueva();document.getElementById('main').scrollTop=0}}

    <div class="dsec"><div class="dsec-t">Nariz</div>${dr('Limpidez',c.limpidez)}${dr('Intensidad',c.intensidad_nariz)}${dr('Desarrollo',c.desarrollo)}${dr('Perfil',c.perfil_nariz)}${dr('Complejidad',c.complejidad_nariz)}${c.aromas_nariz?.length?`<div style="padding:8px 0"><div class="dl" style="margin-bottom:8px">Aromas</div><div class="atags">${c.aromas_nariz.map(a=>`<span class="atag" onclick="S.search='${a}';go('home')">${a}</span>`).join('')}</div></div>`:''}</div>

function radar5(c){
  const ax=[{l:'Dulzor',v:mV(c.dulzor,['Seco','Semi seco','Medio','Dulce'])},{l:'Acidez',v:mV(c.acidez,['Baja','Media','Alta','Punzante'])},{l:'Tanino',v:mV(c.tanino,['Bajo','Medio','Alto','Muy astringente'])},{l:'Alcohol',v:mV(c.alcohol,['Bajo','Medio','Alto','Cálido'])},{l:'Cuerpo',v:mV(c.volumen,['Bajo','Medio','Alto'])},{l:'Complejidad',v:mV(c.complejidad_boca,['Simple','Media','Alta'])}]
  if(ax.every(a=>a.v===0))return''
  const cx=130,cy=120,R=80,n=ax.length,ag=i=>(Math.PI*2*i/n)-Math.PI/2,px=(i,r)=>cx+r*Math.cos(ag(i)),py=(i,r)=>cy+r*Math.sin(ag(i))
  let g='',lb='',dp=[]
  for(let r=1;r<=3;r++){let p=[];for(let i=0;i<n;i++)p.push(px(i,R*r/3)+','+py(i,R*r/3));g+=`<polygon points="${p.join(' ')}" fill="none" stroke="rgba(0,0,0,.07)"/>`}
  for(let i=0;i<n;i++){g+=`<line x1="${cx}" y1="${cy}" x2="${px(i,R)}" y2="${py(i,R)}" stroke="rgba(0,0,0,.05)"/>`;lb+=`<text x="${px(i,R+22)}" y="${py(i,R+22)}" text-anchor="middle" dominant-baseline="middle">${ax[i].l}</text>`;dp.push(px(i,R*ax[i].v/3)+','+py(i,R*ax[i].v/3))}
  return`<div class="radar-wrap"><svg width="260" height="260" viewBox="0 0 260 240">${g}${lb}<polygon points="${dp.join(' ')}" fill="rgba(114,47,55,.1)" stroke="var(--wine)" stroke-width="2"/>${ax.map((_,i)=>`<circle cx="${px(i,R*ax[i].v/3)}" cy="${py(i,R*ax[i].v/3)}" r="4" fill="var(--wine)"/>`).join('')}</svg></div>`
}
function mV(v,sc){if(!v)return 0;const i=sc.indexOf(v);return i<0?0:i+1}
function editCata(id){const c=S.catas.find(x=>x.id===id);if(!c)return;S.f={_id:c.id,bodega:c.bodega,etiqueta:c.etiqueta,varietal:c.varietal,añada:c.anada,origen:c.origen,precio:c.precio,foto_url:c.foto_url,fotoPreview:c.foto_url||null,apariencia:c.apariencia,intV:c.intensidad_vista,cBase:c.color_base,cShade:c.color_shade,cHex:c.color_hex,reflejo:c.reflejo,limpidez:c.limpidez,intN:c.intensidad_nariz,desarrollo:c.desarrollo,pN:c.perfil_nariz||[],compN:c.complejidad_nariz,aN:c.aromas_nariz||[],dulzor:c.dulzor,volumen:c.volumen,acidez:c.acidez,alcohol:c.alcohol,tanino:c.tanino,intS:c.intensidad_sabor,pB:c.perfil_boca||[],compB:c.complejidad_boca,aB:c.aromas_boca||[],persistencia:c.persistencia,final:c.final,score:c.score,cataCom:c.cata_com};S.step=0;S.view='nueva';render()}

/* ══ ESTADÍSTICAS ══ */
function renderStats(){
  document.getElementById('hdr').innerHTML=`<div class="hrow"><div class="back" onclick="go('home')">‹</div><div><div class="htitle">Estadísticas</div><div class="hsub">Tu perfil de catador</div></div></div>`
  const catas=S.catas,total=catas.length
  if(!total){document.getElementById('v-stats').innerHTML='<div style="padding:60px 20px;text-align:center"><div style="font-size:56px;opacity:.3">📊</div><div style="font-family:Fraunces,serif;font-style:italic;font-size:22px;color:var(--dim);margin-top:16px">Sin datos aún</div></div>';return}
  const withScore=catas.filter(c=>c.score),avgS=withScore.length?Math.round(withScore.reduce((a,c)=>a+(+c.score),0)/withScore.length):0
  const best=withScore.length?withScore.reduce((a,c)=>(+c.score)>(+a.score)?c:a,withScore[0]):null
  const varMap={},origMap={},aromaMap={},colorMap={}
  catas.forEach(c=>{if(c.varietal)varMap[c.varietal]=(varMap[c.varietal]||0)+1;if(c.origen)origMap[c.origen]=(origMap[c.origen]||0)+1;if(c.color_base)colorMap[c.color_base]=(colorMap[c.color_base]||0)+1;[...(c.aromas_nariz||[]),...(c.aromas_boca||[])].forEach(a=>{aromaMap[a]=(aromaMap[a]||0)+1})})
  const topVar=Object.entries(varMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
  const topOrig=Object.entries(origMap).sort((a,b)=>b[1]-a[1]).slice(0,5)
  const topAromas=Object.entries(aromaMap).sort((a,b)=>b[1]-a[1]).slice(0,15)
  const dB=withScore.filter(c=>(+c.score)<80).length,dM=withScore.filter(c=>(+c.score)>=80&&(+c.score)<90).length,dA=withScore.filter(c=>(+c.score)>=90).length
  const bw=(v,mx)=>mx?Math.round(v/mx*100):0,mxV=topVar[0]?.[1]||1,mxO=topOrig[0]?.[1]||1
  document.getElementById('v-stats').innerHTML=`<div class="swrap">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="scard" style="padding:14px;text-align:center"><div class="big-stat-n">${total}</div><div class="big-stat-l">Catas</div></div>
      <div class="scard" style="padding:14px;text-align:center"><div class="big-stat-n">${avgS||'—'}</div><div class="big-stat-l">Promedio</div></div>
      <div class="scard" style="padding:14px;text-align:center"><div class="big-stat-n">${best?best.score:'—'}</div><div class="big-stat-l">Mejor</div></div>
    </div>
    ${best?`<div class="scard" style="cursor:pointer" onclick="go('ver','${best.id}')"><div class="scard-title">Mejor vino catado</div><div style="display:flex;align-items:center;gap:12px"><div style="width:44px;height:44px;border-radius:50%;background:${best.color_hex||'#B83050'};border:2px solid rgba(0,0,0,.06)"></div><div><div style="font-family:'Fraunces',serif;font-size:16px;font-style:italic">${best.etiqueta||best.bodega||'Sin nombre'}</div><div style="font-size:12px;color:var(--dim)">${[best.varietal,best.anada].filter(Boolean).join(' · ')}</div></div><div style="margin-left:auto;font-family:'Fraunces',serif;font-size:28px;color:var(--wine)">${best.score}</div></div></div>`:''}
    ${withScore.length?`<div class="scard"><div class="scard-title">Distribución de puntajes</div><div class="score-dist"><div class="score-dist-item"><div class="score-dist-n">${dA}</div><div class="score-dist-l">90–100<br>Excelentes</div></div><div class="score-dist-item"><div class="score-dist-n">${dM}</div><div class="score-dist-l">80–89<br>Buenos</div></div><div class="score-dist-item"><div class="score-dist-n">${dB}</div><div class="score-dist-l">&lt;80<br>Resto</div></div></div></div>`:''}
    ${topVar.length?`<div class="scard"><div class="scard-title">Varietales más catados</div>${topVar.map(([n,v])=>`<div class="stat-row"><div class="stat-row-label">${n}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${bw(v,mxV)}%"></div></div><div class="stat-row-val">${v}</div></div>`).join('')}</div>`:''}
    ${topOrig.length?`<div class="scard"><div class="scard-title">Orígenes</div>${topOrig.map(([n,v])=>`<div class="stat-row"><div class="stat-row-label">${n}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${bw(v,mxO)}%"></div></div><div class="stat-row-val">${v}</div></div>`).join('')}</div>`:''}
    ${Object.keys(colorMap).length?`<div class="scard"><div class="scard-title">Colores más catados</div><div style="display:flex;gap:12px;flex-wrap:wrap">${Object.entries(colorMap).sort((a,b)=>b[1]-a[1]).map(([b,n])=>`<div style="text-align:center"><div style="width:44px;height:44px;border-radius:50%;background:${COLORES[b]?.[0]?.h||'#888'};border:2px solid rgba(0,0,0,.06);margin:0 auto 4px"></div><div style="font-size:11px;color:var(--dim)">${b}</div><div style="font-size:13px;font-weight:500">${n}</div></div>`).join('')}</div></div>`:''}
    ${topAromas.length?`<div class="scard"><div class="scard-title">Aromas más detectados</div><div class="aroma-cloud">${topAromas.map(([a,n])=>`<button class="aroma-tag-big" style="background:rgba(114,47,55,${Math.min(.06+n*.04,.18)});color:var(--wine);border:1px solid rgba(114,47,55,${Math.min(.1+n*.04,.3)})" onclick="S.search='${a}';go('home')">${a} <span style="opacity:.6;font-size:11px">${n}</span></button>`).join('')}</div></div>`:''}
  </div>`
}

  let backBtn=rV!=='main'?`<div class="back" onclick="${rV==='v-detail'?'S.refView=\'varietales\';renderRef()':'S.refView=\'main\';renderRef()'}">‹</div>`:'';
  const titles={main:'Aprender',flash:'Flashcards',aromas:'Aromas',colors:'Colores',scores:'Puntuación',varietales:'Varietales','v-detail':S.vtIdx>=0?V[S.vtIdx].n:'Varietal'}
  document.getElementById('hdr').innerHTML=`<div class="hrow">${backBtn}<div><div class="htitle">${titles[rV]||'Aprender'}</div><div class="hsub">Referencia y estudio</div></div></div>`
  if(rV==='main'){document.getElementById('v-ref').innerHTML=`<div class="rwrap"><div class="aroma-grid">
    <div class="aroma-card" onclick="S.refView='varietales';S.vtTab='b';renderRef()"><div class="aroma-card-bar" style="background:linear-gradient(90deg,#E8D018,#C88800)"></div><div class="aroma-card-name">🍇 Varietales</div><div class="aroma-card-count">${V.length} uvas — blancos y tintos</div></div>
    <div class="aroma-card" onclick="S.refView='flash';S.fcIdx=0;S.fcFlipped=false;flashDeck=[];renderRef()"><div class="aroma-card-bar" style="background:var(--wine)"></div><div class="aroma-card-name">🃏 Flashcards</div><div class="aroma-card-count">Estudiá aromas y colores</div></div>
    <div class="aroma-card" onclick="S.refView='aromas';renderRef()"><div class="aroma-card-bar" style="background:var(--gold)"></div><div class="aroma-card-name">👃 Aromas</div><div class="aroma-card-count">${Object.values(PA).flat().reduce((a,c)=>a+c.i.length,0)} aromas · 7 perfiles</div></div>
    <div class="aroma-card" onclick="S.refView='colors';renderRef()"><div class="aroma-card-bar" style="background:#B83050"></div><div class="aroma-card-name">🎨 Colores</div><div class="aroma-card-count">${Object.values(COLORES).flat().length} tonos del vino</div></div>
    <div class="aroma-card" onclick="S.refView='scores';renderRef()"><div class="aroma-card-bar" style="background:var(--dim)"></div><div class="aroma-card-name">🏆 Puntuación</div><div class="aroma-card-count">Escala de 100 puntos</div></div>
  </div></div>`}
  else if(rV==='varietales')renderVarietales()
  else if(rV==='v-detail')renderVarietalDetail()
  else if(rV==='flash')renderFlash()
  else if(rV==='aromas'){document.getElementById('v-ref').innerHTML=`<div class="rwrap">${Object.entries(PA).map(([p,cats])=>`<div class="rsec"><div class="rtitle">${p}</div><div class="rrule"></div>${cats.map(cat=>`<div class="aroma-detail"><div class="aroma-detail-title">${cat.c}</div><div class="chips">${cat.i.map(a=>`<div class="chip" style="pointer-events:none">${a}</div>`).join('')}</div></div>`).join('')}</div>`).join('')}</div>`}
  else if(rV==='colors'){document.getElementById('v-ref').innerHTML=`<div class="rwrap">${Object.entries(COLORES).map(([b,sh])=>`<div class="rsec"><div class="rtitle">${b}</div><div class="rrule"></div><div style="display:flex;gap:14px;flex-wrap:wrap">${sh.map(s=>`<div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:52px;height:52px;border-radius:50%;background:${s.h};border:2px solid rgba(0,0,0,.08)"></div><div style="font-size:11px;color:var(--dim);text-align:center">${s.n}</div></div>`).join('')}</div></div>`).join('')}</div>`}
  else if(rV==='scores'){document.getElementById('v-ref').innerHTML=`<div class="rwrap"><div class="rsec"><div class="rtitle">Escala de puntuación</div><div class="rrule"></div>${[[97,100,'Perfección'],[93,96,'Excepcional'],[90,92,'Sobresaliente'],[87,89,'Muy Bueno'],[83,86,'Bueno +'],[80,82,'Bueno'],[75,79,'Aceptable'],[50,74,'Por debajo del promedio']].map(([a,b,l])=>`<div class="drow"><span class="dl">${a}–${b}</span><span class="dv">${l}</span></div>`).join('')}</div></div>`}
}

/* ── VARIETALES LIST ── */
function renderVarietales(){
  const blancos=V.filter(v=>v.t==='b'),tintos=V.filter(v=>v.t==='r')
  const tab=S.vtTab
  const list=tab==='b'?blancos:tintos
  document.getElementById('v-ref').innerHTML=`<div class="rwrap">
    <div class="vt-tabs">
      <div class="vt-tab${tab==='b'?' active tb':''}" onclick="S.vtTab='b';renderRef()">🍋 Blancos (${blancos.length})</div>
      <div class="vt-tab${tab==='r'?' active tr':''}" onclick="S.vtTab='r';renderRef()">🍷 Tintos (${tintos.length})</div>
    </div>
    <div class="vt-list">${list.map((v,i)=>{const idx=V.indexOf(v);return`<div class="vt-card" onclick="S.vtIdx=${idx};S.refView='v-detail';renderRef()">
      <div class="vt-card-header" style="background:${v.c}"></div>
      <div class="vt-card-body">
        <div class="vt-card-name">${v.n}</div>
        <div class="vt-card-region">${v.rg.split('·')[0].trim()}</div>
        <div class="vt-card-aromas">${v.ar.slice(0,3).map(a=>`<span class="vt-card-ar">${a}</span>`).join('')}</div>
      </div>
    </div>`}).join('')}</div>
  </div>`
}

/* ── VARIETAL DETAIL (Wine Folly style) ── */
function renderVarietalDetail(){
  const v=V[S.vtIdx];if(!v)return
  const labels=['Cuerpo','Dulzor','Acidez','Tanino','Alcohol']
  // Mini radar SVG
  const cx=80,cy=80,R=55,n=5,ag=i=>(Math.PI*2*i/n)-Math.PI/2,px=(i,r)=>cx+r*Math.cos(ag(i)),py=(i,r)=>cy+r*Math.sin(ag(i))
  let g='',lb='',dp=[]
  for(let r=1;r<=4;r++){let p=[];for(let i=0;i<n;i++)p.push(px(i,R*r/4)+','+py(i,R*r/4));g+=`<polygon points="${p.join(' ')}" fill="none" stroke="rgba(0,0,0,.08)"/>`}
  for(let i=0;i<n;i++){g+=`<line x1="${cx}" y1="${cy}" x2="${px(i,R)}" y2="${py(i,R)}" stroke="rgba(0,0,0,.06)"/>`;lb+=`<text x="${px(i,R+14)}" y="${py(i,R+14)}" text-anchor="middle" dominant-baseline="middle" style="font-size:8px;fill:#8B7355">${labels[i]}</text>`;dp.push(px(i,R*v.p[i]/4)+','+py(i,R*v.p[i]/4))}
  const radar=`<svg width="160" height="160" viewBox="0 0 160 160">${g}${lb}<polygon points="${dp.join(' ')}" fill="${v.c}33" stroke="${v.c}" stroke-width="1.5"/>${v.p.map((_,i)=>`<circle cx="${px(i,R*v.p[i]/4)}" cy="${py(i,R*v.p[i]/4)}" r="3" fill="${v.c}"/>`).join('')}</svg>`
  // Level bars
  const barLabels=['Bajo','Bajo/Med','Medio','Med/Alto','Alto']
  const bars=labels.map((l,i)=>`<div class="stat-row" style="margin-bottom:6px"><div class="stat-row-label" style="min-width:70px;font-size:12px">${l}</div><div class="stat-bar-wrap"><div class="stat-bar" style="width:${v.p[i]/4*100}%;background:${v.c}"></div></div><div class="stat-row-val" style="font-size:11px">${barLabels[v.p[i]]}</div></div>`).join('')
  document.getElementById('v-ref').innerHTML=`<div class="rwrap" style="padding:0 0 110px">
    <div class="vt-detail-header" style="border-left:5px solid ${v.c};padding-left:20px">
      <div class="vt-detail-title" style="color:${v.c}">${v.n}</div>
      <div class="vt-detail-region">${v.rg}</div>
    </div>
    <div class="vt-detail-inner">
      <div class="vt-detail-left">
        <div style="display:flex;justify-content:center;margin-bottom:12px">${radar}</div>
        ${bars}
        <div class="vt-info-pills" style="margin-top:14px">
          <div class="vt-pill">🌡️ ${v.tp}</div>
          <div class="vt-pill">${v.dc?'⏳ Decanter':'✓ Sin decanter'}</div>
          <div class="vt-pill">📅 ${v.gd}</div>
          <div class="vt-pill">💰 ${v.pr}</div>
        </div>
      </div>
      <div class="vt-detail-right">
        <p class="vt-desc">${v.desc}</p>
        <div class="vt-sec-t">Aromas principales</div>
        <div class="vt-aromas-list">${v.ar.map((a,i)=>`<div class="vt-aroma"><div class="vt-aroma-e">${v.e[i]||'🍷'}</div><div>${a}</div></div>`).join('')}</div>
        <div class="vt-sec-t" style="margin-top:16px">Maridaje</div>
        <div class="vt-pairs">${v.mr.map(m=>`<span class="vt-pair">${m}</span>`).join('')}</div>
        <div class="vt-sec-t" style="margin-top:16px">Si te gusta, probá también</div>
        <div class="vt-sims">${v.sm.map(s=>`<span class="vt-sim" onclick="findVarietal('${s}')">${s}</span>`).join('')}</div>
      </div>
    </div>
  </div>`
}
function findVarietal(name){const idx=V.findIndex(v=>v.n.toLowerCase()===name.toLowerCase());if(idx>=0){S.vtIdx=idx;renderRef()}else toast('Varietal no disponible en la guía')}

/* ── FLASHCARDS ── */
function buildDeck(){const d=[];Object.entries(PA).forEach(([p,cats])=>{cats.forEach(cat=>{cat.i.forEach(a=>{d.push({q:a,a:cat.c,hint:'Perfil: '+p})})})});Object.entries(COLORES).forEach(([b,sh])=>{sh.forEach(s=>{d.push({q:b+' '+s.n,a:'Identificar el color',hint:s.n,color:s.h})})});for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]]};return d}
function renderFlash(){if(!flashDeck.length)flashDeck=buildDeck();const card=flashDeck[S.fcIdx];document.getElementById('v-ref').innerHTML=`<div class="rwrap"><div class="fc-container"><div class="fc-counter">${S.fcIdx+1} de ${flashDeck.length}</div><div class="fc-card${S.fcFlipped?' flipped':''}" onclick="S.fcFlipped=!S.fcFlipped;renderFlash()"><div class="fc-inner"><div class="fc-front"><div class="fc-label">¿En qué categoría está?</div>${card.color?`<div style="width:60px;height:60px;border-radius:50%;background:${card.color};border:3px solid rgba(255,255,255,.3);margin-bottom:12px"></div>`:''}<div class="fc-question">${card.q}</div></div><div class="fc-back"><div class="fc-answer">${card.a}</div><div class="fc-hint">${card.hint}</div></div></div></div><div style="font-size:12px;color:var(--dim2);margin-bottom:16px">Tocá para revelar</div><div class="fc-nav"><button class="fc-btn fc-btn-prev" onclick="event.stopPropagation();S.fcIdx=(S.fcIdx-1+flashDeck.length)%flashDeck.length;S.fcFlipped=false;renderFlash()">← Anterior</button><button class="fc-btn fc-btn-next" onclick="event.stopPropagation();S.fcIdx=(S.fcIdx+1)%flashDeck.length;S.fcFlipped=false;renderFlash()">Siguiente →</button></div><div style="margin-top:14px"><button class="fc-btn fc-btn-prev" style="padding:8px 16px;width:auto" onclick="flashDeck=buildDeck();S.fcIdx=0;S.fcFlipped=false;renderFlash()">🔀 Mezclar</button></div></div></div>`}

/* ══ PROFILE ══ */
function renderProfile(){
  const n=S.user?.user_metadata?.name||S.user?.email?.split('@')[0]||''
  document.getElementById('hdr').innerHTML='<div class="hrow"><div><div class="htitle">Perfil</div></div></div>'
  document.getElementById('v-profile').innerHTML=`<div class="pwrap"><div class="pavatar">🍷</div><div class="pname">${n}</div><div class="pemail">${S.user?.email}</div>
    <div class="pcard" style="cursor:pointer" onclick="go('stats')"><div class="pcard-title">Mis estadísticas →</div>${[[S.catas.length,'Catas registradas'],[avg(),'Puntaje promedio']].map(([n,l])=>`<div class="drow"><span class="dl">${l}</span><span class="dv" style="color:var(--wine);font-family:'Fraunces',serif;font-size:20px">${n}</span></div>`).join('')}</div>
    <div class="pcard"><div class="pcard-title">Exportar</div><button class="btn-excel" onclick="exportExcel()">📊 Exportar todas las catas a Excel</button><div style="font-size:12px;color:var(--dim2);margin-top:4px">${S.catas.length} catas · descarga como .xlsx</div></div>
    <button class="btn-out" onclick="signOut()">Cerrar sesión</button>
  </div>`
}

/* ══ BOOTSTRAP ══ */
async function init(){const{data:{session}}=await db.auth.getSession();if(session){S.user=session.user;await loadCatas();document.getElementById('auth').style.display='none';document.getElementById('wrap').style.display='flex';render()}db.auth.onAuthStateChange(async(ev,session)=>{S.user=session?.user||null;if(S.user){await loadCatas();document.getElementById('auth').style.display='none';document.getElementById('wrap').style.display='flex';render()}else{S.catas=[];document.getElementById('auth').style.display='flex';document.getElementById('wrap').style.display='none'}})}
init()
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})
</script>
